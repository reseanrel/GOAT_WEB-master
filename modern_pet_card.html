<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Pet Card Component</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f8fafc;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .pet-card {
            width: 320px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid #e2e8f0;
        }

        .pet-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.12);
        }

        .pet-image {
            height: 160px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .pet-image::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><defs><pattern id="pet-pattern" width="20" height="20" patternUnits="userSpaceOnUse"><circle cx="10" cy="10" r="2" fill="rgba(255,255,255,0.1)"/><circle cx="30" cy="30" r="1" fill="rgba(255,255,255,0.05)"/></pattern></defs><rect width="100" height="100" fill="url(%23pet-pattern)"/></svg>');
            opacity: 0.3;
        }

        .pet-image i {
            font-size: 48px;
            color: rgba(255, 255, 255, 0.8);
            z-index: 1;
            position: relative;
        }

        .pet-category {
            position: absolute;
            top: 12px;
            left: 12px;
            background: rgba(255, 255, 255, 0.9);
            color: #4c51bf;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .pet-content {
            padding: 20px;
        }

        .pet-name {
            font-size: 20px;
            font-weight: 700;
            color: #1a202c;
            margin-bottom: 16px;
            text-align: center;
        }

        .pet-info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }

        .info-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 8px;
            background: #f7fafc;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
        }

        .info-label {
            font-size: 11px;
            color: #718096;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .info-value {
            font-size: 14px;
            color: #2d3748;
            font-weight: 600;
        }

        .pet-status {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        .status-badge {
            background: #48bb78;
            color: white;
            padding: 6px 12px;
            border-radius: 16px;
            font-size: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 2px 8px rgba(72, 187, 120, 0.2);
        }

        .status-badge i {
            font-size: 10px;
        }

        .pet-actions {
            display: flex;
            gap: 8px;
            justify-content: center;
        }

        .btn {
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.2s ease;
            cursor: pointer;
            border: none;
            flex: 1;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: #4c51bf;
            color: white;
        }

        .btn-primary:hover {
            background: #3730a3;
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: #e2e8f0;
            color: #4a5568;
        }

        .btn-secondary:hover {
            background: #cbd5e0;
            transform: translateY(-1px);
        }

        .btn-warning {
            background: #f56565;
            color: white;
        }

        .btn-warning:hover {
            background: #e53e3e;
            transform: translateY(-1px);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .pet-card {
                width: 280px;
            }

            .pet-image {
                height: 140px;
            }

            .pet-content {
                padding: 16px;
            }

            .pet-name {
                font-size: 18px;
            }

            .pet-actions {
                flex-direction: column;
                gap: 6px;
            }

            .btn {
                padding: 12px 16px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="pet-card">
        <div class="pet-image">
            <i class="fas fa-paw"></i>
            <div class="pet-category">DOG</div>
        </div>

        <div class="pet-content">
            <h3 class="pet-name">Buddy</h3>

            <div class="pet-info-grid">
                <div class="info-item">
                    <div class="info-label">Age</div>
                    <div class="info-value">3 yrs</div>
                </div>
                <div class="info-item">
                    <div class="info-label">Gender</div>
                    <div class="info-value">Male</div>
                </div>
                <div class="info-item">
                    <div class="info-label">Breed/Type</div>
                    <div class="info-value">Golden Retriever</div>
                </div>
                <div class="info-item">
                    <div class="info-label">Color</div>
                    <div class="info-value">Golden</div>
                </div>
            </div>

            <div class="pet-status">
                <div class="status-badge">
                    <i class="fas fa-check"></i>
                    Approved
                </div>
            </div>

            <div class="pet-actions">
                <button class="btn btn-primary">
                    <i class="fas fa-eye"></i>
                    View Details
                </button>
                <button class="btn btn-secondary">
                    <i class="fas fa-notes-medical"></i>
                    Records
                </button>
                <button class="btn btn-warning">
                    <i class="fas fa-exclamation-triangle"></i>
                    Report Lost
                </button>
            </div>
        </div>
    </div>
</body>
</html>
