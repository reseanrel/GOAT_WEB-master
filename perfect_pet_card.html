<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Pet Card Component</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .pet-card {
            width: 360px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        .pet-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
        }

        .pet-image {
            width: 100%;
            height: 180px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .pet-image::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><defs><pattern id="pet-pattern" width="20" height="20" patternUnits="userSpaceOnUse"><circle cx="10" cy="10" r="2" fill="rgba(255,255,255,0.1)"/><circle cx="30" cy="30" r="1" fill="rgba(255,255,255,0.05)"/><circle cx="70" cy="70" r="1.5" fill="rgba(255,255,255,0.08)"/></pattern></defs><rect width="100" height="100" fill="url(%23pet-pattern)"/></svg>');
            opacity: 0.4;
        }

        .pet-image i {
            font-size: 56px;
            color: rgba(255, 255, 255, 0.85);
            z-index: 2;
            position: relative;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2));
        }

        .pet-category {
            position: absolute;
            top: 16px;
            left: 16px;
            background: rgba(255, 255, 255, 0.95);
            color: #4c51bf;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
            z-index: 3;
        }

        .pet-content {
            padding: 24px;
        }

        .pet-name {
            font-size: 24px;
            font-weight: 700;
            color: #1e293b;
            text-align: center;
            margin-bottom: 20px;
            line-height: 1.2;
        }

        .pet-info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 20px;
        }

        .info-item {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            transition: all 0.2s ease;
        }

        .info-item:hover {
            background: #f1f5f9;
            border-color: #cbd5e0;
            transform: translateY(-2px);
        }

        .info-label {
            font-size: 11px;
            color: #64748b;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 6px;
            display: block;
        }

        .info-value {
            font-size: 15px;
            color: #1e293b;
            font-weight: 600;
        }

        .pet-status {
            display: flex;
            justify-content: center;
            margin-bottom: 24px;
        }

        .status-badge {
            background: linear-gradient(135deg, #48bb78 0%, #38a169 100%);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 12px rgba(72, 187, 120, 0.25);
        }

        .status-badge i {
            font-size: 12px;
        }

        .pet-actions {
            display: flex;
            gap: 12px;
            align-items: stretch;
        }

        .btn {
            flex: 1;
            height: 44px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border: none;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn-primary {
            background: linear-gradient(135deg, #4c51bf 0%, #3730a3 100%);
            color: white;
            box-shadow: 0 4px 16px rgba(76, 81, 191, 0.3);
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #3730a3 0%, #2d2a85 100%);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(76, 81, 191, 0.4);
        }

        .btn-secondary {
            background: #f1f5f9;
            color: #475569;
            border: 2px solid #e2e8f0;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .btn-secondary:hover {
            background: #e2e8f0;
            border-color: #cbd5e0;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
        }

        .btn-danger {
            background: linear-gradient(135deg, #f56565 0%, #e53e3e 100%);
            color: white;
            box-shadow: 0 4px 16px rgba(245, 101, 101, 0.3);
        }

        .btn-danger:hover {
            background: linear-gradient(135deg, #e53e3e 0%, #dc2626 100%);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(245, 101, 101, 0.4);
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .pet-card {
                width: 100%;
                max-width: 360px;
                margin: 0 16px;
            }

            .pet-content {
                padding: 20px;
            }

            .pet-name {
                font-size: 22px;
            }

            .pet-info-grid {
                gap: 12px;
            }

            .btn {
                height: 48px;
                font-size: 13px;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 12px;
            }

            .pet-card {
                border-radius: 16px;
            }

            .pet-image {
                height: 160px;
            }

            .pet-image i {
                font-size: 48px;
            }

            .pet-content {
                padding: 16px;
            }

            .pet-name {
                font-size: 20px;
                margin-bottom: 16px;
            }

            .pet-actions {
                flex-direction: column;
                gap: 8px;
            }

            .btn {
                height: 44px;
            }
        }
    </style>
</head>
<body>
    <div class="pet-card">
        <!-- Pet Image with Category Badge -->
        <div class="pet-image">
            <i class="fas fa-paw"></i>
            <div class="pet-category">DOG</div>
        </div>

        <!-- Pet Content -->
        <div class="pet-content">
            <!-- Pet Name -->
            <h3 class="pet-name">Buddy</h3>

            <!-- Info Grid -->
            <div class="pet-info-grid">
                <div class="info-item">
                    <span class="info-label">Age</span>
                    <span class="info-value">3 yrs</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Gender</span>
                    <span class="info-value">Male</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Breed/Type</span>
                    <span class="info-value">Golden Retriever</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Color</span>
                    <span class="info-value">Golden</span>
                </div>
            </div>

            <!-- Status Badge -->
            <div class="pet-status">
                <div class="status-badge">
                    <i class="fas fa-check"></i>
                    Approved
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="pet-actions">
                <button class="btn btn-primary">
                    <i class="fas fa-eye"></i>
                    View Details
                </button>
                <button class="btn btn-secondary">
                    <i class="fas fa-notes-medical"></i>
                    Records
                </button>
                <button class="btn btn-danger">
                    <i class="fas fa-exclamation-triangle"></i>
                    Report Lost
                </button>
            </div>
        </div>
    </div>
</body>
</html>
