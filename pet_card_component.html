<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pet Card Component</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .pet-card {
            width: 200px;
            height: 280px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
            padding: 12px;
            display: flex;
            flex-direction: column;
            text-align: left;
        }

        .category-tag {
            background: #4299e1;
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            display: inline-block;
            margin-bottom: 8px;
            align-self: flex-start;
        }

        .pet-name {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 8px;
            color: #2d3748;
        }

        .info-row {
            font-size: 13px;
            color: #4a5568;
            margin-bottom: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .info-label {
            font-weight: 500;
        }

        .info-value {
            color: #2d3748;
        }

        .status {
            font-size: 12px;
            color: #38a169;
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .buttons-row {
            display: flex;
            gap: 6px;
            margin-top: auto;
        }

        .btn {
            height: 28px;
            padding: 0 8px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border: 1px solid #d1d5db;
            background: white;
            color: #4b5563;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 1;
            min-width: 0;
        }

        .btn:hover {
            border-color: #9ca3af;
            background: #f9fafb;
        }

        .btn-warning {
            border-color: #f59e0b;
            color: #d97706;
        }

        .btn-warning:hover {
            border-color: #d97706;
            background: #fef3c7;
        }
    </style>
</head>
<body>
    <div class="pet-card">
        <div class="category-tag">DOG</div>

        <div class="pet-name">telay</div>

        <div class="info-row">
            <span class="info-label">Age:</span>
            <span class="info-value">2 yrs</span>
        </div>

        <div class="info-row">
            <span class="info-label">Gender:</span>
            <span class="info-value">Male</span>
        </div>

        <div class="info-row">
            <span class="info-label">Type:</span>
            <span class="info-value">Alien breed</span>
        </div>

        <div class="info-row">
            <span class="info-label">Color:</span>
            <span class="info-value">brown</span>
        </div>

        <div class="status">
            <span>✅</span>
            <span>Approved</span>
        </div>

        <div class="buttons-row">
            <button class="btn">VIEW DETAILS</button>
            <button class="btn">RECORDS</button>
            <button class="btn btn-warning">REPORT LOST</button>
        </div>
    </div>
</body>
</html>
