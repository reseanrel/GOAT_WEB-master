<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Single Clean Pet Card</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .pet-card {
            width: 340px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            transition: all 0.3s ease;
            border: 1px solid #e2e8f0;
        }

        .pet-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.12);
        }

        /* Pet Image Section */
        .pet-image {
            width: 100%;
            height: 160px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .pet-image i {
            font-size: 48px;
            color: rgba(255, 255, 255, 0.8);
            z-index: 2;
        }

        .pet-category {
            position: absolute;
            top: 12px;
            left: 12px;
            background: rgba(255, 255, 255, 0.95);
            color: #4c51bf;
            padding: 4px 12px;
            border-radius: 16px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        /* Pet Content */
        .pet-content {
            padding: 20px;
        }

        .pet-name {
            font-size: 20px;
            font-weight: 700;
            color: #1a202c;
            text-align: center;
            margin-bottom: 16px;
        }

        /* Info Grid */
        .pet-info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }

        .info-item {
            background: #f7fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 8px 12px;
            text-align: center;
        }

        .info-label {
            font-size: 10px;
            color: #64748b;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 4px;
        }

        .info-value {
            font-size: 14px;
            color: #2d3748;
            font-weight: 600;
        }

        /* Status Badge */
        .pet-status {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        .status-badge {
            background: #48bb78;
            color: white;
            padding: 6px 12px;
            border-radius: 16px;
            font-size: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Action Buttons - ALL INSIDE THE CARD */
        .pet-actions {
            display: flex;
            gap: 8px;
        }

        .btn {
            flex: 1;
            height: 36px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            font-family: inherit;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            text-decoration: none;
        }

        .btn-primary {
            background: #4c51bf;
            color: white;
        }

        .btn-primary:hover {
            background: #3730a3;
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: #e2e8f0;
            color: #4a5568;
        }

        .btn-secondary:hover {
            background: #cbd5e0;
            transform: translateY(-1px);
        }

        .btn-danger {
            background: #f56565;
            color: white;
        }

        .btn-danger:hover {
            background: #e53e3e;
            transform: translateY(-1px);
        }

        /* Responsive */
        @media (max-width: 480px) {
            .pet-card {
                width: 100%;
                max-width: 340px;
                margin: 0 16px;
            }

            .pet-actions {
                flex-direction: column;
                gap: 6px;
            }

            .btn {
                height: 40px;
            }
        }
    </style>
</head>
<body>
    <div class="pet-card">
        <!-- Pet Image (Full Width) -->
        <div class="pet-image">
            <i class="fas fa-paw"></i>
            <div class="pet-category">DOG</div>
        </div>

        <!-- ALL CONTENT INSIDE THE CARD -->
        <div class="pet-content">
            <!-- Pet Name -->
            <h3 class="pet-name">Buddy</h3>

            <!-- Info Grid -->
            <div class="pet-info-grid">
                <div class="info-item">
                    <div class="info-label">Age</div>
                    <div class="info-value">3 yrs</div>
                </div>
                <div class="info-item">
                    <div class="info-label">Gender</div>
                    <div class="info-value">Male</div>
                </div>
                <div class="info-item">
                    <div class="info-label">Breed/Type</div>
                    <div class="info-value">Golden Retriever</div>
                </div>
                <div class="info-item">
                    <div class="info-label">Color</div>
                    <div class="info-value">Golden</div>
                </div>
            </div>

            <!-- Status Badge -->
            <div class="pet-status">
                <div class="status-badge">
                    <i class="fas fa-check"></i>
                    Approved
                </div>
            </div>

            <!-- ACTION BUTTONS INSIDE THE CARD -->
            <div class="pet-actions">
                <button class="btn btn-primary">
                    <i class="fas fa-eye"></i>
                    View Details
                </button>
                <button class="btn btn-secondary">
                    <i class="fas fa-notes-medical"></i>
                    Records
                </button>
                <button class="btn btn-danger">
                    <i class="fas fa-exclamation-triangle"></i>
                    Report Lost
                </button>
            </div>
        </div>
    </div>
</body>
</html>
